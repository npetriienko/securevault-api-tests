name: API Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          ENV: ${{ vars.ENV }}
          BASE_URL: ${{ vars.BASE_URL }}
          ADMIN_ORG_ALPHA_EMAIL: ${{ secrets.ADMIN_ORG_ALPHA_EMAIL }}
          ADMIN_ORG_ALPHA_PASSWORD: ${{ secrets.ADMIN_ORG_ALPHA_PASSWORD }}
          ANALYST_ORG_ALPHA_EMAIL: ${{ secrets.ANALYST_ORG_ALPHA_EMAIL }}
          ANALYST_ORG_ALPHA_PASSWORD: ${{ secrets.ANALYST_ORG_ALPHA_PASSWORD }}
          ADMIN_ORG_BETA_EMAIL: ${{ secrets.ADMIN_ORG_BETA_EMAIL }}
          ADMIN_ORG_BETA_PASSWORD: ${{ secrets.ADMIN_ORG_BETA_PASSWORD }}
        run: pytest

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html
