[pytest]
testpaths = tests
pythonpath = src
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --html=report.html
    --self-contained-html
markers =
    smoke: quick sanity checks
    regression: full regression suite
    auth: authentication endpoints
    assets: asset endpoints
    integration: multi-endpoint end-to-end flows
    p1_critical: critical priority
    p2_high: high priority
    p3_high: medium-high priority
    p4_medium: medium priority
